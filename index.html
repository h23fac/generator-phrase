
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To -Do List</title>
    <link rel="stylesheet" href="../css/styles.css">
    
</head>
<body>
    <div>
        <div class="container"> 
            <h2>Tipos de inpunt</h2>
    <div><input placeholder="Tu nombre"></div>
    <div><input type="email" placeholder="Tu email"></div>
    <div><input type="tel" placeholder="tu numero"></div>

     <div>
        <input type="password" name="Contraseña" placeholder="Ingresar contraseña">
     </div>

     <div>
        <input type="date" name="fecha">
     </div>

    <div>
          <input type="file" value="Enviar">
    </div>
    <div>
        <input type="checkbox" name="opciones" value="Opcion1"> Opcion 1
        <input type="checkbox" name="opciones" value="Opcion2"> Opcion 2
    </div>

    <div>
        <input type="radio" name="Opcion1"> opcion 1 
        <input type="radio" name="Opcion2"> opcion 2

    </div>
    <>
        <input type="image" src="imagen.png" alt="Enviar" width="50">
        <div><textarea name="mensaje" rows="4" cols="40">Escriba su mensaje aqui</textarea></div>
        <div><input type="reset" value="restablecer"></div>
        <div><input type="range" min="0" max="100" step="1"></div>
        <div><input type="search" name="busqueda" placeholder="Buscar..."></div>
        <div><input type="time" name="Hora"></div>
        <button class="btn-agregar">Registrar</button>
        

        </div>

    </div>
         
     
    
    
    

</body>
