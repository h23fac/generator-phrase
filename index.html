<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Almacen de Frases</title>
    <link rel="stylesheet" href="../css/styles.css">

</head>

<body>
    <!--Input es tipo de texto para colocar frases y se constituye de un atributo type tipo texto-->
    <input id="inputFrase" type="text" placeholder="Pon tu Frase">

    <!--Escojer tipo de botton y por ende un atributo type tipo button
    El boton permitira agregar frases nuevas introduccidas en el input-->
    <button id="btnAgregar" type="button">Agregar</button>
    
    <input id="busqueda" type="text" placeholder="Buscar Frase...">

    <!--se usa div para hacer un listado de frases y por ende li que es indispensable un contenedor para mostrar las frases-->
    <div>
        <ol id="listaFrase"></ol>
    </div>
    

    <script src="script.js"></script>

</body>


</html>
